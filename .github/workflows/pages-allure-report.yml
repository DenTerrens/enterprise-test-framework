name: pages-allure-report

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'src/main/**'
      - 'src/test/**'
      - 'pom.xml'
      - '.github/workflows/pages-allure-report.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      API_AUTH_TYPE: ${{ secrets.API_AUTH_TYPE }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
      API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project
        run: mvn -B -DskipTests install --no-transfer-progress

      - name: Install Playwright browsers and OS dependencies
        run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run functional suites
        run: >
          mvn -B clean test -Dgroups=regression -Dheadless=true
          -Dapi.auth.type=${API_AUTH_TYPE:-none}
          -Dapi.auth.token=${API_AUTH_TOKEN:-}
          -Dapi.auth.username=${API_AUTH_USERNAME:-}
          -Dapi.auth.password=${API_AUTH_PASSWORD:-}

      - name: Generate Allure HTML report
        run: mvn -B allure:report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
