name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  functional-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [api, db, files, integration]
    env:
      API_AUTH_TYPE: ${{ secrets.API_AUTH_TYPE }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
      API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run ${{ matrix.suite }} suite
        run: >
          mvn -B clean test -P${{ matrix.suite }} -Dheadless=true
          -Dapi.auth.type=${API_AUTH_TYPE:-none}
          -Dapi.auth.token=${API_AUTH_TOKEN:-}
          -Dapi.auth.username=${API_AUTH_USERNAME:-}
          -Dapi.auth.password=${API_AUTH_PASSWORD:-}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}
          path: allure-results
          if-no-files-found: ignore
