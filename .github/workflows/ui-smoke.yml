name: smoke-suite

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  smoke-checks:
    runs-on: ubuntu-latest
    env:
      API_AUTH_TYPE: ${{ secrets.API_AUTH_TYPE }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
      API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify formatting
        run: mvn -B spotless:check

      - name: Execute smoke suite
        run: >
          mvn -B clean test -Dgroups=smoke -Dheadless=true
          -Dapi.auth.type=${API_AUTH_TYPE:-none}
          -Dapi.auth.token=${API_AUTH_TOKEN:-}
          -Dapi.auth.username=${API_AUTH_USERNAME:-}
          -Dapi.auth.password=${API_AUTH_PASSWORD:-}

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            allure-results
            reports/surefire
            logs
          if-no-files-found: ignore
