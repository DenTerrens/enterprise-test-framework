name: ui-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  playwright-ui:
    runs-on: ubuntu-latest
    env:
      API_AUTH_TYPE: ${{ secrets.API_AUTH_TYPE }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
      API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Execute UI smoke suite
        run: >
          mvn -B clean test -Pui -Dgroups=ui -Dheadless=true
          -Dapi.auth.type=${API_AUTH_TYPE:-none}
          -Dapi.auth.token=${API_AUTH_TOKEN:-}
          -Dapi.auth.username=${API_AUTH_USERNAME:-}
          -Dapi.auth.password=${API_AUTH_PASSWORD:-}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results
          if-no-files-found: ignore
